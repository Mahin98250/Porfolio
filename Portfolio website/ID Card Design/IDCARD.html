<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced ID Card</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="card">

    <!-- TOP STRIPE -->
    <div class="top-bar"></div>

    <!-- HEADER -->
    <div class="header">
        <h2>Anand Niketan Bhadaj School</h2>
        <span>STUDENT ID CARD</span>
    </div>

    <!-- PHOTO -->
    <div class="photo">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTp5uGEswTfHlLnVX6ES7hrrVLhp7Dt9_Fi3Q&s" alt="hello">
    </div>

    <!-- NAME -->
    <div class="name">Mahin Patel</div>
    <div class="class">Class 10-C</div>

    <!-- DETAILS -->
    <div class="details">
        <div><span>ID</span><p>485</p></div>
        <div><span>DOB</span><p>02-08-2011</p></div>
    </div>

    <!-- QR -->
    <div class="qr">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=485" alt="hello">
    </div>

    <!-- FOOTER -->
    <div class="footer">
        Valid for Academic Year 2026-27
    </div>

</div>

</body>
</html>
