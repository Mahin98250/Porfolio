<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal ID Card</title>
<link rel="stylesheet" href="styless.css">
</head>

<body bgcolor="lightblue">

<div class="card">

    <!-- PROFILE -->
    <img class="profile" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTp5uGEswTfHlLnVX6ES7hrrVLhp7Dt9_Fi3Q&s" alt="Profile">

    <!-- NAME -->
    <h2 class="name">Mahin Patel</h2>
    <p class="role">Class 10-C</p>

    <!-- DIVIDER -->
    <div class="line"></div>

    <!-- DETAILS -->
    <div class="info">
        <div>
            <span>ID</span>
            <p>485</p>
        </div>
        <div>
            <span>DOB</span>
            <p>02 Aug 2011</p>
        </div>
    </div>

    <!-- QR -->
    <div class="qr">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=90x90&data=485" alt="Hello">
    </div>

    <!-- FOOTER -->
    <div class="footer">
        Anand Niketan Bhadaj School
    </div>

</div>

</body>
</html>
